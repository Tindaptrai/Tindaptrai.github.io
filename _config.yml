title: "Nguyễn Lê Trọng Tín"
tagline: "SOC Analyst • Network Security Analyst"
description: "Personal cybersecurity notes, SOC analysis, network security, HTB writeups and DFIR learning."

url: "https://tindaptrai.github.io"
baseurl: ""

github:
  username: Tindaptrai

social:
  name: "Nguyễn Lê Trọng Tín"
  links:
    - "https://github.com/Tindaptrai"

avatar: "/assets/img/avatar.png"

timezone: Asia/Ho_Chi_Minh
lang: en
theme_mode: dark

theme: jekyll-theme-chirpy

plugins:
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-archives
  - jekyll-paginate

paginate: 10
paginate_path: "/page:num/"

jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: category
    tag: tag
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

collections:
  tabs:
    output: true
    sort_by: order
    permalink: /:path/
