title: "Nguyễn Lê Trọng Tín"
tagline: "SOC Analyst • Network Security Analyst"
description: "Personal cybersecurity notes, HTB writeups, SOC labs and DFIR learning."

url: "https://tindaptrai.github.io""
baseurl: ""

github:
  username: Tindaptrai

social:
  name: "Nguyễn Lê Trọng Tín"
  links:
    - "https://github.com/Tindaptrai"

avatar: "/assets/img/avatar.png"

timezone: Asia/Ho_Chi_Minh
lang: vi-VN

theme: jekyll-theme-chirpy

plugins:
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-archives
  - jekyll-paginate-v2

pagination:
  enabled: true
  collection: posts
  per_page: 10
  permalink: "/page/:num/"
  title: ":title - page :num"
  sort_field: date
  sort_reverse: true
  trail:
    before: 2
    after: 2